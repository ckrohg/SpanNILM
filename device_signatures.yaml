# Known Device Signatures for NILM Classification
# Each device has characteristic power levels, duty cycles, and state patterns.
# These are starting templates - the system learns and refines from actual data.
#
# Fields:
#   category: Grouping for display
#   power_range: [min_w, max_w]
#   duration_range: [min_s, max_s] — typical single run
#   duty_cycle_pattern: cycling | sustained | intermittent | brief | multi_phase | variable
#   startup_surge: whether device has inrush current spike
#   surge_multiplier: ratio of surge to steady-state (1.0 = no surge)
#   steady_state_variance: 0-1, how much power fluctuates during operation
#   typical_locations: where this device is commonly found
#   typical_hours: [start_hour, end_hour] in 24h format
#   seasonal: year_round | winter | summer
#   cycling_on_s: typical ON duration per cycle (null if not cycling)
#   cycling_off_s: typical OFF duration per cycle (null if not cycling)
#   power_stability: 1.0 = perfectly flat, 0.5 = very variable

